<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اختبار تغطية آفاق الفكر</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin:0; font-family: Tahoma, Arial, sans-serif; background:#f6f7f9; }
    .top { padding:14px; background:#111827; color:white; }
    .wrap { display:grid; grid-template-columns: 380px 1fr; min-height: calc(100vh - 54px); }
    .panel { padding:16px; background:white; box-shadow:0 0 12px #0002; z-index:2; }
    #map { height: calc(100vh - 54px); }
    button { width:100%; padding:12px; margin:8px 0; border:0; border-radius:10px; cursor:pointer; font-size:16px; background:#2563eb; color:white; }
    button.secondary { background:#374151; }
    input { width:100%; box-sizing:border-box; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:8px; font-size:15px; }
    .result { margin-top:12px; padding:12px; border-radius:10px; background:#f3f4f6; line-height:1.7; }
    .ok { background:#dcfce7; color:#14532d; }
    .bad { background:#fee2e2; color:#7f1d1d; }
    .hide { display:none; }
    small { color:#666; }
    @media(max-width:800px) { .wrap { grid-template-columns:1fr; } #map { height:55vh; } }
  </style>
</head>
<body>
  <div class="top">اختبار فحص تغطية الزونات - آفاق الفكر</div>
  <div class="wrap">
    <div class="panel">
      <h2>فحص التغطية</h2>
      <p>اضغط تحديد موقعي، أو اضغط على الخريطة لاختبار أي نقطة يدويًا.</p>
      <button onclick="locateMe()">حدد موقعي</button>
      <button class="secondary" onclick="clearResult()">مسح النتيجة</button>
      <div id="result" class="result">بانتظار اختيار الموقع...</div>
      <div id="formBox" class="hide">
        <h3>طلب اشتراك</h3>
        <input id="name" placeholder="اسم العميل" />
        <input id="phone" placeholder="رقم الهاتف" />
        <button onclick="submitRequest()">إرسال الطلب التجريبي</button>
        <small>حاليًا هذا تجريبي ويطبع البيانات بالصفحة/Console. لاحقًا نربطه بـ Odoo API.</small>
      </div>
      <pre id="payload" style="white-space:pre-wrap;background:#111827;color:#e5e7eb;padding:10px;border-radius:8px;direction:ltr;text-align:left;display:none"></pre>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script>
    const map = L.map('map').setView([32.60210106705336, 44.059584233064854], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let zones = null;
    let userMarker = null;
    let matchedZone = null;
    let lastLatLng = null;

    fetch('zones.geojson')
      .then(r => r.json())
      .then(data => {
        zones = data;
        const layer = L.geoJSON(zones, {
          style: { weight: 2, fillOpacity: 0.18 },
          onEachFeature: (feature, layer) => {
            const p = feature.properties || {};
            layer.bindPopup(`Zone: ${p.name || p.ZoneID || p.id || 'بدون اسم'}`);
          }
        }).addTo(map);
        map.fitBounds(layer.getBounds());
      });

    fetch('points.geojson')
      .then(r => r.json())
      .then(data => {
        L.geoJSON(data, {
          pointToLayer: (feature, latlng) => L.circleMarker(latlng, {radius:4}),
          onEachFeature: (feature, layer) => {
            const p = feature.properties || {};
            layer.bindPopup(`Point: ${p.name || p.id || 'بدون اسم'}`);
          }
        }).addTo(map);
      }).catch(() => {});

    function locateMe() {
      if (!navigator.geolocation) {
        showBad('المتصفح لا يدعم تحديد الموقع.');
        return;
      }
      navigator.geolocation.getCurrentPosition(
        pos => checkCoverage(pos.coords.latitude, pos.coords.longitude),
        err => showBad('لم يتم السماح بتحديد الموقع أو حدث خطأ.')
      );
    }

    map.on('click', e => checkCoverage(e.latlng.lat, e.latlng.lng));

    function checkCoverage(lat, lng) {
      if (!zones) { showBad('ملف الزونات لم يكتمل تحميله بعد.'); return; }
      lastLatLng = {lat, lng};
      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.marker([lat, lng]).addTo(map).bindPopup('موقع الاختبار').openPopup();
      const point = turf.point([lng, lat]);
      matchedZone = null;
      for (const zone of zones.features) {
        if (turf.booleanPointInPolygon(point, zone)) { matchedZone = zone; break; }
      }
      if (matchedZone) {
        const p = matchedZone.properties || {};
        const zoneName = p.name || p.ZoneID || p.id || 'Zone';
        document.getElementById('result').className = 'result ok';
        document.getElementById('result').innerHTML = `✅ موقعك داخل منطقة التغطية<br>الزون: <b>${zoneName}</b><br>Latitude: ${lat.toFixed(6)}<br>Longitude: ${lng.toFixed(6)}`;
        document.getElementById('formBox').classList.remove('hide');
      } else {
        showBad(`❌ موقعك خارج التغطية حاليًا<br>Latitude: ${lat.toFixed(6)}<br>Longitude: ${lng.toFixed(6)}`);
        document.getElementById('formBox').classList.add('hide');
      }
      map.setView([lat,lng], 16);
    }

    function showBad(msg) {
      document.getElementById('result').className = 'result bad';
      document.getElementById('result').innerHTML = msg;
    }

    function clearResult() {
      document.getElementById('result').className = 'result';
      document.getElementById('result').innerHTML = 'بانتظار اختيار الموقع...';
      document.getElementById('formBox').classList.add('hide');
      document.getElementById('payload').style.display = 'none';
      if (userMarker) map.removeLayer(userMarker);
    }

    function submitRequest() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      if (!name || !phone) { alert('اكتب الاسم ورقم الهاتف'); return; }
      const p = matchedZone.properties || {};
      const payload = {
        customer_name: name,
        phone: phone,
        latitude: lastLatLng.lat,
        longitude: lastLatLng.lng,
        zone_name: p.name || p.ZoneID || p.id || null,
        zone_properties: p,
        created_at: new Date().toISOString()
      };
      document.getElementById('payload').style.display = 'block';
      document.getElementById('payload').textContent = JSON.stringify(payload, null, 2);
      console.log('Subscription request payload:', payload);
      alert('تم تجهيز الطلب التجريبي. لاحقًا هذا ينرسل إلى Odoo.');
    }
  </script>
</body>
</html>
